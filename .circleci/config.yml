version: 2.1

jobs:
  build:
    docker:
      - image: cimg/node:22.11
    working_directory: ~/project
    steps:
      - checkout
      - restore_cache:
          keys:
            - spotter-npm-v1-{{ checksum "package-lock.json" }}
            - spotter-npm-v1-
      - run:
          name: Install dependencies
          command: npm ci
      - save_cache:
          key: spotter-npm-v1-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
      - run:
          name: Verify Spotter static site
          command: npm run build
      - store_artifacts:
          path: site
          destination: spotter-site

workflows:
  spotter_integrity:
    jobs:
      - build
